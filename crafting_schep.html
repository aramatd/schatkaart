<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crafting Gouden Schep</title>
<style>
body{
  font-family:Arial;
  background:#c6c6c6;
  text-align:center;
  margin:10px;
}
:root{
  --slot:12vw;
}
#crafting{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:3vw;
  margin-top:20px;
}
#grid{
  display:grid;
  grid-template-columns:repeat(3,var(--slot));
  gap:1vw;
}
.slot{
  width:var(--slot);
  height:var(--slot);
  background:#8b8b8b;
  border-top:0.6vw solid #373737;
  border-left:0.6vw solid #373737;
  border-right:0.6vw solid #ffffff;
  border-bottom:0.6vw solid #ffffff;
  cursor:pointer;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.slot img{
  width:90%;
  height:90%;
  object-fit:contain;
}
.selected{
  filter:brightness(1.4);
}
.count{
  position:absolute;
  bottom:2px;
  right:4px;
  font-weight:bold;
  color:white;
  text-shadow:1px 1px 2px black;
  font-size:4vw;
}
#arrow img{
  width:9vw;
}
#result{
  width:18vw;
  height:18vw;
  display:flex;
  align-items:center;
  justify-content:center;
}
#inventory{
  margin-top:4vw;
  display:grid;
  grid-template-columns:repeat(7,var(--slot));
  gap:1vw;
  justify-content:center;
}
#book{
  background:#c6c6c6;
  width:var(--slot);
  height:var(--slot);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
#book img{
  width:80%;
  height:80%;
  object-fit:contain;
}

/* Popup receptenboek */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0008;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
}
#popupBox{
  background:#c6c6c6;
  padding:20px;
  border-radius:8px;
  max-width:500px;
  width:90%;
  max-height:90%;
  overflow-y:auto;
}
#popupBox h3{
  margin-top:0;
}
.recipe-row{
  margin:20px 0;
}
.recipe-grid{
  display:grid;
  grid-template-columns:repeat(3,30px);
  grid-template-rows:repeat(3,30px);
  gap:3px;
  justify-content:center;
  margin-top:5px;
}
.recipe-grid .slot{
  width:30px;
  height:30px;
  background:#8b8b8b;
  border-top:2px solid #373737;
  border-left:2px solid #373737;
  border-right:2px solid #fff;
  border-bottom:2px solid #fff;
  display:flex;
  align-items:center;
  justify-content:center;
}
.recipe-grid .slot img{
  width:90%;
  height:90%;
  object-fit:contain;
}
.caption{
  text-align:center;
  font-weight:bold;
  margin-top:5px;
}
#popupBox button{
  margin-top:10px;
  padding:5px 10px;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="crafting">
  <div id="book" onclick="openBook()">
    <img src="recipe_book.png">
  </div>
  
  <div id="grid"></div>
  
  <div id="arrow">
    <img src="arrow.png">
  </div>
  
  <div id="result" class="slot"></div>
</div>

<div id="inventory"></div>

<!-- Popup receptenboek -->
<div id="popup" onclick="closeBook(event)">
  <div id="popupBox">
    <h3>Recepten</h3>
    <p>Klik naast het venster of op de knop om te sluiten.</p>

    <!-- Planken -->
    <div class="recipe-row">
      <div class="caption">Planken (1 houtblok = 4 planken)</div>
      <div class="recipe-grid">
        <div class="slot"><img src="log_oak.png"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
      </div>
    </div>

    <!-- Stokken -->
    <div class="recipe-row">
      <div class="caption">Stokken (1 plank = 2 stokken)</div>
      <div class="recipe-grid">
        <div class="slot"><img src="planks_oak.png"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"><img src="planks_oak.png"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
      </div>
    </div>

    <!-- Gold Ingot -->
    <div class="recipe-row">
      <div class="caption">Goud ingot (9 goud nuggets = 1 goud ingot)</div>
      <div class="recipe-grid">
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
      </div>
    </div>

    <!-- Gouden Schep -->
    <div class="recipe-row">
      <div class="caption">Gouden schep (1 goud ingot + 2 stokken)</div>
      <div class="recipe-grid">
        <div class="slot"></div>
        <div class="slot"><img src="gold_ingot.png"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"><img src="stick.png"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"><img src="stick.png"></div>
        <div class="slot"></div>
      </div>
    </div>

    <button onclick="closeBook({target:{id:'popup'}})">Sluiten</button>
  </div>
</div>

<script>
function openBook(){document.getElementById("popup").style.display="flex";}
function closeBook(e){if(e.target.id=="popup"){document.getElementById("popup").style.display="none";}}

// Inventory: 1 houtblok + 9 gold nuggets
let inventoryData=[
  {type:"log",count:1},
  {type:"goldNugget",count:9},
  null,null,null,null,null
];
let selectedSlot=null;
const inventory=document.getElementById("inventory");

function drawInventory(){
  inventory.innerHTML="";
  inventoryData.forEach((item,i)=>{
    let s=document.createElement("div");
    s.className="slot";
    if(i===selectedSlot)s.classList.add("selected");
    if(item){
      s.classList.add(item.type);
      let img=document.createElement("img");
      img.src=item.type=="log"?"log_oak.png":
               item.type=="plank"?"planks_oak.png":
               item.type=="goldNugget"?"gold_nugget.png":
               item.type=="ingot"?"gold_ingot.png":
               item.type=="stick"?"stick.png":
               item.type=="schep"?"golden_shovel.png":"";
      s.appendChild(img);
      let c=document.createElement("div");
      c.className="count";
      c.innerText=item.count;
      s.appendChild(c);
      s.onclick=function(){
        selectedSlot=i;
        drawInventory();
        if(item.type=="schep"){window.location="pagina4.html";}
      }
    }else{s.onclick=function(){selectedSlot=null;drawInventory();}}
    inventory.appendChild(s)
  })
}
drawInventory()

let gridData=[]
for(let i=0;i<9;i++){gridData.push(null)}
const grid=document.getElementById("grid")

function drawGrid(){
  grid.innerHTML=""
  gridData.forEach((item,i)=>{
    let s=document.createElement("div")
    s.className="slot"
    if(item){
      s.classList.add(item.type)
      let img=document.createElement("img");
      img.src=item.type=="log"?"log_oak.png":
                item.type=="plank"?"planks_oak.png":
                item.type=="goldNugget"?"gold_nugget.png":
                item.type=="ingot"?"gold_ingot.png":
                item.type=="stick"?"stick.png":
                item.type=="schep"?"golden_shovel.png":"";
      s.appendChild(img);
      let c=document.createElement("div")
      c.className="count"
      c.innerText=item.count
      s.appendChild(c)
    }
    s.onclick=function(){
      let inv=inventoryData[selectedSlot]
      if(inv){
        if(!gridData[i]){
          gridData[i]={type:inv.type,count:1}
        }else if(gridData[i].type==inv.type){
          gridData[i].count++
        }else{return}
        inv.count--
        if(inv.count==0){inventoryData[selectedSlot]=null;selectedSlot=null}
        drawInventory()
        drawGrid()
        checkRecipe()
        return
      }
      if(gridData[i]){
        addItem(gridData[i].type,gridData[i].count)
        gridData[i]=null
        drawInventory()
        drawGrid()
        checkRecipe()
      }
    }
    grid.appendChild(s)
  })
}
drawGrid()

function addItem(type,count){
  let slot=inventoryData.findIndex(i=>i && i.type==type)
  if(slot!=-1){inventoryData[slot].count+=count;return}
  let empty=inventoryData.findIndex(i=>i==null)
  if(empty!=-1){inventoryData[empty]={type:type,count:count}}
}

function checkRecipe(){
  let result=document.getElementById("result")
  result.className="slot"
  result.innerHTML=""

  // Planken
  let logCount=0
  gridData.forEach(s=>{if(s && s.type=="log"){logCount+=s.count}})
  if(logCount>0){
    result.classList.add("plank")
    let c=document.createElement("div")
    c.className="count"
    c.innerText=logCount*4
    result.appendChild(c)
    result.onclick=function(){
      addItem("plank",4)
      for(let i=0;i<gridData.length;i++){
        let s=gridData[i]
        if(s && s.type=="log"){s.count--;if(s.count==0)gridData[i]=null;break}
      }
      drawInventory(); drawGrid(); checkRecipe()
    }
    return
  }

  // Stokken
  let plankCount=0
  gridData.forEach(s=>{if(s && s.type=="plank"){plankCount+=s.count}})
  if(plankCount>0){
    result.classList.add("stick")
    let c=document.createElement("div")
    c.className="count"
    c.innerText=plankCount*2
    result.appendChild(c)
    result.onclick=function(){
      let used=0
      for(let i=0;i<gridData.length;i++){
        let s=gridData[i]
        if(s && s.type=="plank" && used<1){
          addItem("stick",2)
          s.count--;if(s.count==0)gridData[i]=null
          used++
        }
      }
      drawInventory(); drawGrid(); checkRecipe()
    }
    return
  }

  // Gold Ingot: exact 9 nuggets, 1 per vakje
  if(gridData.every(s=>s && s.type=="goldNugget" && s.count==1)){
    result.classList.add("ingot")
    let c=document.createElement("div"); c.className="count"; c.innerText="1"; result.appendChild(c)
    result.onclick=function(){
      addItem("ingot",1)
      for(let i=0;i<gridData.length;i++) gridData[i]=null
      drawInventory(); drawGrid(); checkRecipe()
    }
    return
  }

  // Gouden Schep: patroon 3x3 grid, alleen 1 ingot boven midden, sticks in midden van middelste en onderste rij
  let patternCorrect = gridData[1] && gridData[1].type=="ingot" &&
                       gridData[4] && gridData[4].type=="stick" &&
                       gridData[7] && gridData[7].type=="stick" &&
                       gridData.filter((s,i)=>[1,4,7].includes(i) ? false : s).every(s=>!s);
  if(patternCorrect){
    result.classList.add("schep")
    result.onclick=function(){
      addItem("schep",1)
      [1,4,7].forEach(i=>gridData[i]=null)
      drawInventory(); drawGrid(); checkRecipe()
    }
  }
}
</script>

</body>
</html>
