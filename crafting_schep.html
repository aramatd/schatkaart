<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crafting Gouden Schep</title>
<link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">
<style>
body{
  font-family:Arial;
  background:#c6c6c6;
  text-align:center;
  margin:10px;
}
:root{
  --slot:12vw;
}
#crafting{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:3vw;
  margin-top:20px;
}
#grid{
  display:grid;
  grid-template-columns:repeat(3,var(--slot));
  row-gap:0; /* Geen ruimte tussen rijen */
  column-gap:1vw;
}
.slot{
  width:var(--slot);
  height:var(--slot);
  background:#8b8b8b;
  border-top:0.6vw solid #373737;
  border-left:0.6vw solid #373737;
  border-right:0.6vw solid #ffffff;
  border-bottom:0.6vw solid #ffffff;
  cursor:pointer;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.slot img{
  width:90%;
  height:90%;
  object-fit:contain;
}
.selected{
  filter:brightness(1.4);
}
.log{background-image:url("log_oak.png");background-size:cover;}
.plank{background-image:url("planks_oak.png");background-size:cover;}
.goldNugget{background-image:url("gold_nugget.png");background-size:cover;}
.ingot{background-image:url("gold_ingot.png");background-size:cover;}
.stick{background-image:url("stick.png");background-size:cover;}
.schep{background-image:url("golden_shovel.png");background-size:cover;}
.count{
  position:absolute;
  bottom:2px;
  right:4px;
  font-weight:bold;
  color:white;
  text-shadow:1px 1px 2px black;
  font-size:4vw;
}
#arrow img{
  width:9vw;
}
#result{
  width:18vw;
  height:18vw;
  display:flex;
  align-items:center;
  justify-content:center;
}
#inventory{
  margin-top:4vw;
  display:grid;
  grid-template-columns:repeat(7,var(--slot));
  gap:1vw;
  justify-content:center;
}

/* Popup receptenboek */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0008;
  align-items:center;
  justify-content:center;
  overflow:auto;
}
#popupBox{
  background:#c6c6c6;
  padding:20px;
  border-radius:8px;
  max-width:90%;
  display:flex;
  flex-direction:column;
  font-family:'Minecraftia', sans-serif;
}
#popupBox h3{
  margin-top:0;
}
.recipe-row{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  margin:15px 0;
}
.recipe-grid{
  display:grid;
  grid-template-columns:repeat(3,20px);
  grid-template-rows:repeat(3,20px);
  gap:2px;
  margin-top:5px;
}
.recipe-grid .slot{
  width:20px;
  height:20px;
  background:#8b8b8b;
  border-top:1px solid #373737;
  border-left:1px solid #373737;
  border-right:1px solid #fff;
  border-bottom:1px solid #fff;
  display:flex;
  align-items:center;
  justify-content:center;
}
.recipe-grid .slot img{
  width:90%;
  height:90%;
  object-fit:contain;
}
#popupHint{
  text-align:center;
  margin-top:10px;
  font-size:0.9em;
  color:#333;
}
#book img{
  width:80%;
  height:80%;
  object-fit:contain;
  cursor:pointer;
}
#book{
  background:#c6c6c6;
  width:var(--slot);
  height:var(--slot);
  display:flex;
  align-items:center;
  justify-content:center;
}
.title{
font-family:'Minecraftia', sans-serif;
color:black;
font-size:4vw;
margin-top:10px;
margin-bottom:10px;
letter-spacing:1px;
text-align:left;
}
</style>
</head>
<body>
<div class="title">Vervaardigen</div>
<div id="crafting">
  <div id="book">
    <img src="recipe_book.png" onclick="openBook()">
  </div>
  
  <div id="grid"></div>
  
  <div id="arrow">
    <img src="arrow.png">
  </div>
  
  <div id="result" class="slot"></div>
</div>

<div class="title">Inventaris</div>
<div id="inventory"></div>

<!-- Popup receptenboek -->
<div id="popup" onclick="closeBook(event)">
  <div id="popupBox">
    <h3>Recepten</h3>

    <!-- Planken -->
    <div class="recipe-row">
      <div>Planken (1 houtblok = 4 planken)</div>
      <div class="recipe-grid">
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"><img src="log_oak.png"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
      </div>
    </div>

    <!-- Stokken -->
    <div class="recipe-row">
      <div>Stokken (1 plank = 2 stokken)</div>
      <div class="recipe-grid">
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"><img src="planks_oak.png"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
      </div>
    </div>

    <!-- Gold Ingot -->
    <div class="recipe-row">
      <div>Goudstaaf (9 goudklompjes = 1 goudstaaf)</div>
      <div class="recipe-grid">
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
        <div class="slot"><img src="gold_nugget.png"></div>
      </div>
    </div>

    <!-- Gouden Schep -->
    <div class="recipe-row">
      <div>Gouden schep (1 goudstaaf + 2 stokken)</div>
      <div class="recipe-grid">
        <div class="slot"></div><div class="slot"><img src="gold_ingot.png"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot"><img src="stick.png"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot"><img src="stick.png"></div><div class="slot"></div>
      </div>
    </div>

    <div id="popupHint">Klik naast het venster om te sluiten</div>
  </div>
</div>

<script>
function openBook(){document.getElementById("popup").style.display="flex";}
function closeBook(e){if(e.target.id=="popup"){document.getElementById("popup").style.display="none";}}

// Inventory
let inventoryData=[{type:"log",count:1},{type:"goldNugget",count:9},null,null,null,null,null];
let selectedSlot=null;
const inventory=document.getElementById("inventory");

function drawInventory(){
  inventory.innerHTML="";
  inventoryData.forEach((item,i)=>{
    let s=document.createElement("div");
    s.className="slot";
    if(i===selectedSlot){s.classList.add("selected")}
    if(item){
      s.classList.add(item.type);
      let c=document.createElement("div");
      c.className="count";
      c.innerText=item.count;
      s.appendChild(c)
      s.onclick=function(){
        selectedSlot=i
        drawInventory()
        if(item.type=="schep"){window.location="pagina4.html";}
      }
    }else{
      s.onclick=function(){selectedSlot=null;drawInventory();}
    }
    inventory.appendChild(s)
  })
}
drawInventory()

let gridData=[]
for(let i=0;i<9;i++){gridData.push(null)}
const grid=document.getElementById("grid")

function drawGrid(){
  grid.innerHTML=""
  gridData.forEach((item,i)=>{
    let s=document.createElement("div")
    s.className="slot"
    if(item){
      s.classList.add(item.type)
      let c=document.createElement("div")
      c.className="count"
      c.innerText=item.count
      s.appendChild(c)
    }
    s.onclick=function(){
      let inv=inventoryData[selectedSlot]
      if(inv){
        if(!gridData[i]){
          gridData[i]={type:inv.type,count:1}
        }else if(gridData[i].type==inv.type){
          gridData[i].count++
        }else{return}
        inv.count--
        if(inv.count==0){inventoryData[selectedSlot]=null;selectedSlot=null}
        drawInventory()
        drawGrid()
        checkRecipe()
        return
      }
      if(gridData[i]){
        addItem(gridData[i].type,gridData[i].count)
        gridData[i]=null
        drawInventory()
        drawGrid()
        checkRecipe()
      }
    }
    grid.appendChild(s)
  })
}
drawGrid()

function addItem(type,count){
  let slot=inventoryData.findIndex(i=>i && i.type==type)
  if(slot!=-1){inventoryData[slot].count+=count;return}
  let empty=inventoryData.findIndex(i=>i==null)
  if(empty!=-1){inventoryData[empty]={type:type,count:count}}
}

// Check recipes
function checkRecipe(){
  let result=document.getElementById("result")
  result.className="slot"
  result.innerHTML=""
  result.onclick=null

  // Hout -> planken
  if(gridData.filter(s=>s).length===1 && gridData.some(s=>s && s.type=="log")){
    result.classList.add("plank")
    let c=document.createElement("div")
    c.className="count"
    c.innerText="4"
    result.appendChild(c)
    result.onclick=function(){
      addItem("plank",4)
      for(let i=0;i<9;i++){if(gridData[i] && gridData[i].type=="log"){gridData[i]=null; break}}
      drawInventory(); drawGrid(); checkRecipe()
    }
    return
  }

  // Plank -> stick (alle planken tellen)
  let plankSlots = gridData.filter(s => s && s.type=="plank");
  if(plankSlots.length>0 && gridData.filter(s => s && s.type!="plank").length===0){
    result.classList.add("stick")
    let c=document.createElement("div")
    c.className="count"
    let total = plankSlots.reduce((sum,s)=>sum+s.count,0)
    c.innerText = total*2
    result.appendChild(c)
    result.onclick = function(){
      for(let i=0;i<9;i++){
        if(gridData[i] && gridData[i].type=="plank"){
          gridData[i]=null
        }
      }
      addItem("stick", total*2)
      drawInventory(); drawGrid(); checkRecipe()
    }
    return
  }

  // Gold nuggets -> ingot (alle 9 correct verdeeld)
  let allNine=true
  for(let i=0;i<9;i++){
    if(!gridData[i] || gridData[i].type!="goldNugget"){allNine=false; break}
  }
  if(allNine){
    result.classList.add("ingot")
    let c=document.createElement("div")
    c.className="count"
    c.innerText="1"
    result.appendChild(c)
    result.onclick=function(){
      addItem("ingot",1)
      for(let i=0;i<9;i++){gridData[i]=null}
      drawInventory(); drawGrid(); checkRecipe()
    }
    return
  }

  // Gouden schep exact patroon
  const patterns=[
    [1,4,7], // middenkolom
    [0,3,6], // linkerkolom
    [2,5,8]  // rechterkolom
  ]
  for(let p of patterns){
    let valid=true
    for(let i=0;i<9;i++){
      if(p.includes(i)){
        if(i===p[0] && (!gridData[i] || gridData[i].type!="ingot")){valid=false; break}
        if((i===p[1] || i===p[2]) && (!gridData[i] || gridData[i].type!="stick")){valid=false; break}
      } else {
        if(gridData[i]){valid=false; break}
      }
    }
    if(valid){
      result.classList.add("schep")
      result.onclick=function(){
        addItem("schep",1)
        for(let i of p){gridData[i]=null}
        drawInventory(); drawGrid(); checkRecipe()
      }
      return
    }
  }
}
</script>

</body>
</html>
