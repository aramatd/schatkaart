<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crafting Gouden Schep</title>
<style>
body{
  font-family:Arial;
  background:#c6c6c6;
  text-align:center;
  margin:10px;
}
:root{
  --slot:12vw;
}
#crafting{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:3vw;
  margin-top:20px;
}
#grid{
  display:grid;
  grid-template-columns:repeat(3,var(--slot));
  row-gap:0;
  column-gap:1vw;
}
.slot{
  width:var(--slot);
  height:var(--slot);
  background:#8b8b8b;
  border-top:0.6vw solid #373737;
  border-left:0.6vw solid #373737;
  border-right:0.6vw solid #ffffff;
  border-bottom:0.6vw solid #ffffff;
  cursor:pointer;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.selected{
  filter:brightness(1.4);
}
.log{background-image:url("log_oak.png");background-size:cover;}
.plank{background-image:url("planks_oak.png");background-size:cover;}
.goldNugget{background-image:url("gold_nugget.png");background-size:cover;}
.ingot{background-image:url("gold_ingot.png");background-size:cover;}
.stick{background-image:url("stick.png");background-size:cover;}
.schep{background-image:url("golden_shovel.png");background-size:cover;}
.count{
  position:absolute;
  bottom:2px;
  right:4px;
  font-weight:bold;
  color:white;
  text-shadow:1px 1px 2px black;
  font-size:4vw;
}
#arrow img{
  width:9vw;
}
#result{
  width:18vw;
  height:18vw;
  display:flex;
  align-items:center;
  justify-content:center;
}
#inventory{
  margin-top:4vw;
  display:grid;
  grid-template-columns:repeat(7,var(--slot));
  gap:1vw;
  justify-content:center;
}

/* Popup receptenboek */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0008;
  display:flex;
  align-items:center;
  justify-content:center;
}
#popupBox{
  background:#c6c6c6;
  padding:20px;
  border-radius:8px;
  max-width:90%;
  max-height:90%;
  display:flex;
  flex-direction:column;
}
#popupBox h3{
  margin-top:0;
}
#recipesContent{
  overflow-y:auto;
  flex-grow:1;
}
.recipe-row{
  margin:10px 0;
  text-align:center;
}
.recipe-grid{
  display:grid;
  grid-template-columns:repeat(3,20px);
  grid-template-rows:repeat(3,20px);
  gap:2px;
  justify-content:center;
  margin-top:5px;
}
.recipe-grid .slot{
  width:20px;
  height:20px;
  background:#8b8b8b;
  border-top:1px solid #373737;
  border-left:1px solid #373737;
  border-right:1px solid #fff;
  border-bottom:1px solid #fff;
}
.recipe-grid .slot img{
  width:90%;
  height:90%;
  object-fit:contain;
}
#popupHint{
  font-size:0.9em;
  text-align:center;
  color:#333;
  margin-top:10px;
}
#book img{
  width:80%;
  height:80%;
  object-fit:contain;
  cursor:pointer;
}
#book{
  background:#c6c6c6;
  width:var(--slot);
  height:var(--slot);
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>
<body>

<div id="crafting">
  <div id="book">
    <img src="recipe_book.png" onclick="openBook()">
  </div>
  
  <div id="grid"></div>
  
  <div id="arrow">
    <img src="arrow.png">
  </div>
  
  <div id="result" class="slot"></div>
</div>

<div id="inventory"></div>

<!-- Popup receptenboek -->
<div id="popup" onclick="closeBook(event)">
  <div id="popupBox">
    <h3>Recepten</h3>
    <div id="recipesContent">
      <!-- Planken -->
      <div class="recipe-row">
        <div>Planken (1 houtblok = 4 planken)</div>
        <div class="recipe-grid">
          <div class="slot"><img src="log_oak.png"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
        </div>
      </div>

      <!-- Stokken -->
      <div class="recipe-row">
        <div>Stokken (1 plank = 2 stokken)</div>
        <div class="recipe-grid">
          <div class="slot"><img src="planks_oak.png"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
        </div>
      </div>

      <!-- Gold Ingot -->
      <div class="recipe-row">
        <div>Goud ingot (9 goud nuggets = 1 goud ingot)</div>
        <div class="recipe-grid">
          <div class="slot"><img src="gold_nugget.png"></div>
          <div class="slot"><img src="gold_nugget.png"></div>
          <div class="slot"><img src="gold_nugget.png"></div>
          <div class="slot"><img src="gold_nugget.png"></div>
          <div class="slot"><img src="gold_nugget.png"></div>
          <div class="slot"><img src="gold_nugget.png"></div>
          <div class="slot"><img src="gold_nugget.png"></div>
          <div class="slot"><img src="gold_nugget.png"></div>
          <div class="slot"><img src="gold_nugget.png"></div>
        </div>
      </div>

      <!-- Gouden Schep -->
      <div class="recipe-row">
        <div>Gouden schep (1 goud ingot + 2 stokken)</div>
        <div class="recipe-grid">
          <div class="slot"></div>
          <div class="slot"><img src="gold_ingot.png"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"><img src="stick.png"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"><img src="stick.png"></div>
          <div class="slot"></div>
        </div>
      </div>
    </div>

    <div id="popupHint">Klik naast het venster om te sluiten</div>
  </div>
</div>

<script>
function openBook(){
  document.getElementById("popup").style.display="flex";
}

function closeBook(e){
  if(e.target.id=="popup"){
    document.getElementById("popup").style.display="none";
  }
}

// Inventory
let inventoryData=[
  {type:"log",count:1},
  {type:"goldNugget",count:9},
  null,null,null,null,null
];
let selectedSlot=null;
const inventory=document.getElementById("inventory");

function drawInventory(){
  inventory.innerHTML="";
  inventoryData.forEach((item,i)=>{
    let s=document.createElement("div");
    s.className="slot";
    if(i===selectedSlot){s.classList.add("selected")}
    if(item){
      s.classList.add(item.type);
      let c=document.createElement("div");
      c.className="count";
      c.innerText=item.count;
      s.appendChild(c)
      s.onclick=function(){
        selectedSlot=i
        drawInventory()
        if(item.type=="schep"){window.location="pagina4.html";}
      }
    }else{
      s.onclick=function(){selectedSlot=null;drawInventory();}
    }
    inventory.appendChild(s)
  })
}
drawInventory()

let gridData=[]
for(let i=0;i<9;i++){gridData.push(null)}
const grid=document.getElementById("grid")

function drawGrid(){
  grid.innerHTML=""
  gridData.forEach((item,i)=>{
    let s=document.createElement("div")
    s.className="slot"
    if(item){
      s.classList.add(item.type)
      let c=document.createElement("div")
      c.className="count"
      c.innerText=item.count
      s.appendChild(c)
    }
    s.onclick=function(){
      let inv=inventoryData[selectedSlot]
      if(inv){
        if(!gridData[i]){
          gridData[i]={type:inv.type,count:1}
        }else if(gridData[i].type==inv.type){
          gridData[i].count++
        }else{return}
        inv.count--
        if(inv.count==0){inventoryData[selectedSlot]=null;selectedSlot=null}
        drawInventory()
        drawGrid()
        checkRecipe()
        return
      }
      if(gridData[i]){
        addItem(gridData[i].type,gridData[i].count)
        gridData[i]=null
        drawInventory()
        drawGrid()
        checkRecipe()
      }
    }
    grid.appendChild(s)
  })
}
drawGrid()

function addItem(type,count){
  let slot=inventoryData.findIndex(i=>i && i.type==type)
  if(slot!=-1){inventoryData[slot].count+=count;return}
  let empty=inventoryData.findIndex(i=>i==null)
  if(empty!=-1){inventoryData[empty]={type:type,count:count}}
}

// checkRecipe blijft hetzelfde als eerder (zoals correct werkte)
</script>

</body>
</html>
