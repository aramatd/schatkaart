<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crafting Gouden Schep</title>
<style>
body{
  font-family:Arial;
  background:#c6c6c6;
  text-align:center;
  margin:10px;
}
:root{
  --slot:12vw;
}
#crafting{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:3vw;
  margin-top:20px;
}
#grid{
  display:grid;
  grid-template-columns:repeat(3,var(--slot));
  gap:1vw;
}
.slot{
  width:var(--slot);
  height:var(--slot);
  background:#8b8b8b;
  border-top:0.6vw solid #373737;
  border-left:0.6vw solid #373737;
  border-right:0.6vw solid #ffffff;
  border-bottom:0.6vw solid #ffffff;
  cursor:pointer;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.selected{
  filter:brightness(1.4);
}
.log{background-image:url("log_oak.png");background-size:cover;}
.plank{background-image:url("planks_oak.png");background-size:cover;}
.goldNugget{background-image:url("gold_nugget.png");background-size:cover;}
.ingot{background-image:url("gold_ingot.png");background-size:cover;}
.stick{background-image:url("stick.png");background-size:cover;}
.schep{background-image:url("golden_shovel.png");background-size:cover;}
.count{
  position:absolute;
  bottom:2px;
  right:4px;
  font-weight:bold;
  color:white;
  text-shadow:1px 1px 2px black;
  font-size:4vw;
}
#arrow img{
  width:9vw;
}
#result{
  width:18vw;
  height:18vw;
  display:flex;
  align-items:center;
  justify-content:center;
}
#inventory{
  margin-top:4vw;
  display:grid;
  grid-template-columns:repeat(7,var(--slot));
  gap:1vw;
  justify-content:center;
}

/* Popup receptenboek */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0008;
  align-items:center;
  justify-content:center;
  overflow:auto;
}
#popupBox{
  background:#c6c6c6;
  padding:20px;
  border-radius:8px;
  max-width:90%;
}
#popupBox h3{
  margin-top:0;
}
.recipe-row{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  margin:15px 0;
}
.recipe-grid{
  display:grid;
  grid-template-columns:repeat(3,20px);
  grid-template-rows:repeat(3,20px);
  gap:2px;
  margin-top:5px;
}
.recipe-grid .slot{
  width:20px;
  height:20px;
  background:#8b8b8b;
  border-top:1px solid #373737;
  border-left:1px solid #373737;
  border-right:1px solid #fff;
  border-bottom:1px solid #fff;
}
.recipe-grid .slot img{
  width:90%;
  height:90%;
  object-fit:contain;
}
#book img{
  width:80%;
  height:80%;
  object-fit:contain;
  cursor:pointer;
}
#book{
  background:#c6c6c6;
  width:var(--slot);
  height:var(--slot);
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>
<body>

<div id="crafting">
  <div id="book">
    <img src="recipe_book.png" onclick="openBook()">
  </div>
  
  <div id="grid"></div>
  
  <div id="arrow">
    <img src="arrow.png">
  </div>
  
  <div id="result" class="slot"></div>
</div>

<div id="inventory"></div>

<!-- Popup receptenboek -->
<div id="popup" onclick="closeBook(event)">
  <div id="popupBox">
    <h3>Recepten (klik naast het venster om te sluiten)</h3>

    <!-- Planken -->
    <div class="recipe-row">
      <div>Planken (1 houtblok = 4 planken)</div>
      <div class="recipe-grid">
        <div class="slot log"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
      </div>
    </div>

    <!-- Stokken -->
    <div class="recipe-row">
      <div>Stokken (1 plank = 2 stokken)</div>
      <div class="recipe-grid">
        <div class="slot plank"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
      </div>
    </div>

    <!-- Gold Ingot -->
    <div class="recipe-row">
      <div>Goud ingot (9 goud nuggets = 1 goud ingot)</div>
      <div class="recipe-grid">
        <div class="slot goldNugget"></div>
        <div class="slot goldNugget"></div>
        <div class="slot goldNugget"></div>
        <div class="slot goldNugget"></div>
        <div class="slot goldNugget"></div>
        <div class="slot goldNugget"></div>
        <div class="slot goldNugget"></div>
        <div class="slot goldNugget"></div>
        <div class="slot goldNugget"></div>
      </div>
    </div>

    <!-- Gouden Schep -->
    <div class="recipe-row">
      <div>Gouden schep (1 goud ingot + 2 stokken)</div>
      <div class="recipe-grid">
        <!-- Middenkolom -->
        <div class="slot"></div><div class="slot ingot"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot stick"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot stick"></div><div class="slot"></div>
      </div>
    </div>

  </div>
</div>

<script>
function openBook(){
  document.getElementById("popup").style.display="flex";
}
function closeBook(e){
  if(e.target.id=="popup"){
    document.getElementById("popup").style.display="none";
  }
}

// Inventory: 1 houtblok + 9 gold nuggets
let inventoryData=[
  {type:"log",count:1},
  {type:"goldNugget",count:9},
  null,null,null,null,null
];
let selectedSlot=null;
const inventory=document.getElementById("inventory");

function drawInventory(){
  inventory.innerHTML="";
  inventoryData.forEach((item,i)=>{
    let s=document.createElement("div");
    s.className="slot";
    if(i===selectedSlot){s.classList.add("selected")}
    if(item){
      s.classList.add(item.type);
      let c=document.createElement("div");
      c.className="count";
      c.innerText=item.count;
      s.appendChild(c)
      s.onclick=function(){
        selectedSlot=i
        drawInventory()
        if(item.type=="schep"){window.location="pagina4.html";}
      }
    }else{
      s.onclick=function(){selectedSlot=null;drawInventory();}
    }
    inventory.appendChild(s)
  })
}
drawInventory()

let gridData=[]
for(let i=0;i<9;i++){gridData.push(null)}
const grid=document.getElementById("grid")

function drawGrid(){
  grid.innerHTML=""
  gridData.forEach((item,i)=>{
    let s=document.createElement("div")
    s.className="slot"
    if(item){
      s.classList.add(item.type)
      let c=document.createElement("div")
      c.className="count"
      c.innerText=item.count
      s.appendChild(c)
    }
    s.onclick=function(){
      let inv=inventoryData[selectedSlot]
      if(inv){
        if(!gridData[i]){
          gridData[i]={type:inv.type,count:1}
        }else if(gridData[i].type==inv.type){
          gridData[i].count++
        }else{return}
        inv.count--
        if(inv.count==0){inventoryData[selectedSlot]=null;selectedSlot=null}
        drawInventory()
        drawGrid()
        checkRecipe()
        return
      }
      if(gridData[i]){
        addItem(gridData[i].type,gridData[i].count)
        gridData[i]=null
        drawInventory()
        drawGrid()
        checkRecipe()
      }
    }
    grid.appendChild(s)
  })
}
drawGrid()

function addItem(type,count){
  let slot=inventoryData.findIndex(i=>i && i.type==type)
  if(slot!=-1){inventoryData[slot].count+=count;return}
  let empty=inventoryData.findIndex(i=>i==null)
  if(empty!=-1){inventoryData[empty]={type:type,count:count}}
}

// Check recipes
function checkRecipe(){
  let result=document.getElementById("result")
  result.className="slot"
  result.innerHTML=""

  // Hout -> planken
  let logCount=0
  gridData.forEach(s=>{if(s && s.type=="log"){logCount+=s.count}})
  if(logCount>0){
    result.classList.add("plank")
    let c=document.createElement("div")
    c.className="count"
    c.innerText=logCount*4
    result.appendChild(c)
    result.onclick=function(){
      addItem("plank",4)
      for(let i=0;i<gridData.length;i++){
        let s=gridData[i]
        if(s && s.type=="log"){s.count--;if(s.count==0){gridData[i]=null}break}
      }
      drawInventory()
      drawGrid()
      checkRecipe()
    }
    return
  }

  // Plank -> stick
  let plankCount=0
  gridData.forEach(s=>{if(s && s.type=="plank"){plankCount+=s.count}})
  if(plankCount>0){
    result.classList.add("stick")
    let c=document.createElement("div")
    c.className="count"
    c.innerText=plankCount*2
    result.appendChild(c)
    result.onclick=function(){
      let used=0
      for(let i=0;i<gridData.length;i++){
        let s=gridData[i]
        if(s && s.type=="plank" && used<1){
          addItem("stick",2)
          s.count--;if(s.count==0){gridData[i]=null}
          used++
        }
      }
      drawInventory()
      drawGrid()
      checkRecipe()
    }
    return
  }

  // Gold nuggets -> ingot (alle 9 correct verdeeld)
  let allNine=true
  for(let i=0;i<9;i++){
    if(!gridData[i] || gridData[i].type!="goldNugget"){allNine=false; break}
  }
  if(allNine){
    result.classList.add("ingot")
    let c=document.createElement("div")
    c.className="count"
    c.innerText="1"
    result.appendChild(c)
    result.onclick=function(){
      addItem("ingot",1)
      for(let i=0;i<9;i++){gridData[i]=null}
      drawInventory()
      drawGrid()
      checkRecipe()
    }
    return
  }

  // Gouden schep exact patroon (middel, links, rechts) + geen andere items
  const patterns=[
    [1,4,7], // middenkolom
    [0,3,6], // linkerkolom
    [2,5,8]  // rechterkolom
  ]
  for(let p of patterns){
    let valid=true
    for(let i=0;i<9;i++){
      if(p.includes(i)){
        if(!gridData[i] || (i===p[0] && gridData[i].type!="ingot") || (i===p[1] && gridData[i].type!="stick") || (i===p[2] && gridData[i].type!="stick")){
          valid=false; break
        }
      }else{
        if(gridData[i]){valid=false; break}
      }
    }
    if(valid){
      result.classList.add("schep")
      result.onclick=function(){
        addItem("schep",1)
        for(let i of p){gridData[i]=null}
        drawInventory()
        drawGrid()
        checkRecipe()
      }
      return
    }
  }
}
</script>

</body>
</html>
