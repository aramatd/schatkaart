<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Minecraft Crafting</title>

<style>

body{
font-family:Arial;
background:#c6c6c6;
text-align:center;
margin:10px;
}

:root{
--slot:12vw;
}

#crafting{
display:flex;
align-items:center;
justify-content:center;
gap:3vw;
margin-top:20px;
}

/* boek */

#book img{
width:10vw;
cursor:pointer;
}

/* popup */

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

#popupContent{
background:white;
padding:20px;
border-radius:10px;
}

#recipeGrid{
display:grid;
grid-template-columns:repeat(3,60px);
gap:6px;
margin-top:10px;
}

.recipeSlot{
width:60px;
height:60px;
background:#8b8b8b;
border-top:4px solid #373737;
border-left:4px solid #373737;
border-right:4px solid #ffffff;
border-bottom:4px solid #ffffff;
}

.recipePlank{
background-image:url("planks_oak.png");
background-size:cover;
}

#grid{
display:grid;
grid-template-columns:repeat(3,var(--slot));
gap:1vw;
padding:1vw;
}

.slot{
width:var(--slot);
height:var(--slot);
background:#8b8b8b;
border-top:0.6vw solid #373737;
border-left:0.6vw solid #373737;
border-right:0.6vw solid #ffffff;
border-bottom:0.6vw solid #ffffff;
cursor:pointer;
position:relative;
}

.plank{
background-image:url("planks_oak.png");
background-size:cover;
}

.boot{
background-image:url("boot.png");
background-size:cover;
}

.selected{
filter:brightness(1.4);
}

.count{
position:absolute;
bottom:2px;
right:4px;
font-weight:bold;
color:white;
text-shadow:1px 1px 2px black;
font-size:4vw;
}

#arrow img{
width:9vw;
}

#result{
width:20vw;
height:20vw;
background:#8b8b8b;
border-top:0.6vw solid #373737;
border-left:0.6vw solid #373737;
border-right:0.6vw solid #ffffff;
border-bottom:0.6vw solid #ffffff;
display:flex;
align-items:center;
justify-content:center;
}

#result img{
width:80%;
cursor:pointer;
}

#inventory{
margin-top:4vw;
display:grid;
grid-template-columns:repeat(7,var(--slot));
gap:1vw;
justify-content:center;
padding:1vw;
}

</style>
</head>

<body>

<div id="crafting">

<div id="book">
<img src="recipe_book.png" onclick="openBook()">
</div>

<div id="grid">
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
</div>

<div id="arrow">
<img src="arrow.png">
</div>

<div id="result"></div>

</div>

<div id="inventory"></div>

<!-- popup -->

<div id="popup" onclick="closeBook()">

<div id="popupContent" onclick="event.stopPropagation()">

<h3>Boot recept</h3>

<div id="recipeGrid">

<div class="recipeSlot"></div>
<div class="recipeSlot"></div>
<div class="recipeSlot"></div>

<div class="recipeSlot recipePlank"></div>
<div class="recipeSlot"></div>
<div class="recipeSlot recipePlank"></div>

<div class="recipeSlot recipePlank"></div>
<div class="recipeSlot recipePlank"></div>
<div class="recipeSlot recipePlank"></div>

</div>

<p>Klik buiten het venster om te sluiten</p>

</div>
</div>

<script>

/* receptenboek */

function openBook(){
document.getElementById("popup").style.display="flex"
}

function closeBook(){
document.getElementById("popup").style.display="none"
}

/* inventory systeem */

let inventoryData=[
{type:"plank",count:5},
null,null,null,null,null,null
]

let selectedSlot=null

let inventory=document.getElementById("inventory")

function drawInventory(){

inventory.innerHTML=""

inventoryData.forEach((item,i)=>{

let s=document.createElement("div")
s.className="slot"

if(i===selectedSlot){
s.classList.add("selected")
}

if(item){

s.classList.add(item.type)

let c=document.createElement("div")
c.className="count"
c.innerText=item.count
s.appendChild(c)

s.onclick=function(){

selectedSlot=i
drawInventory()

if(item.type=="boot"){
window.location="pagina2.html"
}

}

}else{

s.onclick=function(){
selectedSlot=null
drawInventory()
}

}

inventory.appendChild(s)

})

}

drawInventory()

let slots=document.querySelectorAll("#grid .slot")

slots.forEach(slot=>{

slot.onclick=function(){

let selectedItem=inventoryData[selectedSlot]

if(selectedItem && selectedItem.type=="plank" && selectedItem.count>0 && !slot.classList.contains("plank")){

slot.classList.add("plank")

selectedItem.count--

if(selectedItem.count==0){
inventoryData[selectedSlot]=null
selectedSlot=null
}

drawInventory()
checkRecipe()
return

}

if(slot.classList.contains("plank")){

slot.classList.remove("plank")

let plankSlot=inventoryData.findIndex(i=>i && i.type=="plank")

if(plankSlot!=-1){

inventoryData[plankSlot].count++

}else{

let empty=inventoryData.findIndex(i=>i==null)

inventoryData[empty]={type:"plank",count:1}

}

drawInventory()
checkRecipe()

}

}

})

function addBoot(){

let bootSlot=inventoryData.findIndex(i=>i && i.type=="boot")

if(bootSlot!=-1){

inventoryData[bootSlot].count++

}else{

let empty=inventoryData.findIndex(i=>i==null)

if(empty!=-1){
inventoryData[empty]={type:"boot",count:1}
}

}

drawInventory()

}

function checkRecipe(){

let g=[]

slots.forEach(s=>{
g.push(s.classList.contains("plank")?1:0)
})

let result=document.getElementById("result")
result.innerHTML=""

let recipe1=
g[0]==0 && g[1]==0 && g[2]==0 &&
g[3]==1 && g[4]==0 && g[5]==1 &&
g[6]==1 && g[7]==1 && g[8]==1

let recipe2=
g[0]==1 && g[1]==0 && g[2]==1 &&
g[3]==1 && g[4]==1 && g[5]==1 &&
g[6]==0 && g[7]==0 && g[8]==0

if(recipe1 || recipe2){

let img=document.createElement("img")
img.src="boot.png"

img.onclick=function(){

addBoot()

/* planken uit grid verwijderen */

slots.forEach(s=>{
s.classList.remove("plank")
})

result.innerHTML=""

}

result.appendChild(img)

}

}

</script>

</body>
</html>
