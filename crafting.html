<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Minecraft Crafting</title>

<style>

body{
font-family:Arial;
background:#c6c6c6;
text-align:center;
margin:10px;
}

:root{
--slot:12vw;
}

#crafting{
display:flex;
align-items:center;
justify-content:center;
gap:3vw;
margin-top:20px;
}

#book img{
width:10vw;
cursor:pointer;
}

/* grid */

#grid{
display:grid;
grid-template-columns:repeat(3,var(--slot));
gap:1vw;
}

/* slot */

.slot{
width:var(--slot);
height:var(--slot);
background:#8b8b8b;
border-top:0.6vw solid #373737;
border-left:0.6vw solid #373737;
border-right:0.6vw solid #ffffff;
border-bottom:0.6vw solid #ffffff;
cursor:pointer;
position:relative;
}

.selected{
filter:brightness(1.4);
}

/* textures */

.log{background-image:url("log_oak.png");background-size:cover;}
.plank{background-image:url("planks_oak.png");background-size:cover;}
.boot{background-image:url("boot.png");background-size:cover;}

/* aantallen */

.count{
position:absolute;
bottom:2px;
right:4px;
font-weight:bold;
color:white;
text-shadow:1px 1px 2px black;
font-size:4vw;
}

/* arrow */

#arrow img{
width:9vw;
}

/* result */

#result{
width:18vw;
height:18vw;
background:#8b8b8b;
border-top:0.6vw solid #373737;
border-left:0.6vw solid #373737;
border-right:0.6vw solid #ffffff;
border-bottom:0.6vw solid #ffffff;
position:relative;
cursor:pointer;
}

/* inventory */

#inventory{
margin-top:4vw;
display:grid;
grid-template-columns:repeat(7,var(--slot));
gap:1vw;
justify-content:center;
}

/* popup */

#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0008;
align-items:center;
justify-content:center;
}

#popupBox{
background:white;
padding:20px;
}

</style>
</head>

<body>

<div id="crafting">

<div id="book">
<img src="recipe_book.png" onclick="openBook()">
</div>

<div id="grid"></div>

<div id="arrow">
<img src="arrow.png">
</div>

<div id="result"></div>

</div>

<div id="inventory"></div>

<div id="popup">
<div id="popupBox">

<h3>Recepten</h3>

<p>Hout → Planken</p>

<div style="display:grid;grid-template-columns:repeat(3,60px);gap:5px">
<div class="slot log"></div>
<div></div>
<div></div>
</div>

<p>Boot</p>

<div style="display:grid;grid-template-columns:repeat(3,60px);gap:5px">

<div></div><div></div><div></div>

<div class="slot plank"></div>
<div></div>
<div class="slot plank"></div>

<div class="slot plank"></div>
<div class="slot plank"></div>
<div class="slot plank"></div>

</div>

<br>

<button onclick="closeBook()">Sluiten</button>

</div>
</div>

<script>

/* popup */

function openBook(){
document.getElementById("popup").style.display="flex"
}

function closeBook(){
document.getElementById("popup").style.display="none"
}

/* inventory */

let inventoryData=[
{type:"log",count:2},
null,null,null,null,null,null
]

let selectedSlot=null

const inventory=document.getElementById("inventory")

function drawInventory(){

inventory.innerHTML=""

inventoryData.forEach((item,i)=>{

let s=document.createElement("div")
s.className="slot"

if(i===selectedSlot){
s.classList.add("selected")
}

if(item){

s.classList.add(item.type)

let c=document.createElement("div")
c.className="count"
c.innerText=item.count
s.appendChild(c)

s.onclick=function(){

selectedSlot=i
drawInventory()

if(item.type=="boot"){
window.location="pagina2.html"
}

}

}else{

s.onclick=function(){
selectedSlot=null
drawInventory()
}

}

inventory.appendChild(s)

})

}

drawInventory()

/* grid */

let gridData=[]

for(let i=0;i<9;i++){
gridData.push(null)
}

const grid=document.getElementById("grid")

function drawGrid(){

grid.innerHTML=""

gridData.forEach((item,i)=>{

let s=document.createElement("div")
s.className="slot"

if(item){

s.classList.add(item.type)

let c=document.createElement("div")
c.className="count"
c.innerText=item.count
s.appendChild(c)

}

s.onclick=function(){

let inv=inventoryData[selectedSlot]

if(inv){

if(!gridData[i]){

gridData[i]={type:inv.type,count:1}

}else if(gridData[i].type==inv.type){

gridData[i].count++

}else{
return
}

inv.count--

if(inv.count==0){
inventoryData[selectedSlot]=null
selectedSlot=null
}

drawInventory()
drawGrid()
checkRecipe()

return
}

if(gridData[i]){

addItem(gridData[i].type,gridData[i].count)
gridData[i]=null

drawInventory()
drawGrid()
checkRecipe()

}

}

grid.appendChild(s)

})

}

drawGrid()

function addItem(type,count){

let slot=inventoryData.findIndex(i=>i && i.type==type)

if(slot!=-1){
inventoryData[slot].count+=count
return
}

let empty=inventoryData.findIndex(i=>i==null)

if(empty!=-1){
inventoryData[empty]={type:type,count:count}
}

}

/* recepten */

function checkRecipe(){

let result=document.getElementById("result")
result.innerHTML=""

let logSlot=gridData.find(s=>s && s.type=="log")

if(logSlot){

let total=logSlot.count*4

result.className="plank"

let c=document.createElement("div")
c.className="count"
c.innerText=total

result.appendChild(c)

result.onclick=function(){

addItem("plank",4)

logSlot.count--

if(logSlot.count==0){

let index=gridData.indexOf(logSlot)
gridData[index]=null

}

drawInventory()
drawGrid()
checkRecipe()

}

return
}

/* boot */

let items=gridData.map(s=>s?s.type:"")

let r1 =
items[0]=="" && items[1]=="" && items[2]=="" &&
items[3]=="plank" && items[4]=="" && items[5]=="plank" &&
items[6]=="plank" && items[7]=="plank" && items[8]=="plank"

let r2 =
items[0]=="plank" && items[1]=="" && items[2]=="plank" &&
items[3]=="plank" && items[4]=="plank" && items[5]=="plank" &&
items[6]=="" && items[7]=="" && items[8]==""

if(r1 || r2){

result.className="boot"

result.onclick=function(){

addItem("boot",1)

gridData=[null,null,null,null,null,null,null,null,null]

drawInventory()
drawGrid()
checkRecipe()

}

}

}

</script>

</body>
</html>
