<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Minecraft Crafting</title>

<style>

body{
font-family:Arial;
background:#c6c6c6;
text-align:center;
margin:10px;
}

/* basis grootte van slots */
:root{
--slot:12vw;
}

/* crafting layout */

#crafting{
display:flex;
align-items:center;
justify-content:center;
gap:3vw;
margin-top:20px;
}

/* grid */

#grid{
display:grid;
grid-template-columns:repeat(3,var(--slot));
gap:1vw;
background:#c6c6c6;
padding:1vw;
}

/* slot style */

.slot{
width:var(--slot);
height:var(--slot);
background:#8b8b8b;
border-top:0.7vw solid #373737;
border-left:0.7vw solid #373737;
border-right:0.7vw solid #ffffff;
border-bottom:0.7vw solid #ffffff;
cursor:pointer;
}

/* geselecteerd inventory slot */

.selected{
filter:brightness(1.4);
}

/* plank texture */

.plank{
background-image:url("planks_oak.png");
background-size:cover;
}

/* arrow */

#arrow img{
width:9vw;
}

/* result vak (groter) */

#result{
width:16vw;
height:16vw;
background:#8b8b8b;
border-top:0.7vw solid #373737;
border-left:0.7vw solid #373737;
border-right:0.7vw solid #ffffff;
border-bottom:0.7vw solid #ffffff;
display:flex;
align-items:center;
justify-content:center;
}

#result img{
width:80%;
cursor:pointer;
}

/* inventory */

#inventory{
margin-top:4vw;
display:grid;
grid-template-columns:repeat(7,var(--slot));
gap:1vw;
justify-content:center;
background:#c6c6c6;
padding:1vw;
}

</style>
</head>

<body>

<div id="crafting">

<div id="grid">
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
</div>

<div id="arrow">
<img src="arrow.png">
</div>

<div id="result"></div>

</div>

<div id="inventory"></div>

<script>

let inventorySlots=[1,1,1,1,1,0,0];
let selectedSlot=-1;

let invDiv=document.getElementById("inventory");

function drawInventory(){

invDiv.innerHTML="";

inventorySlots.forEach((item,i)=>{

let s=document.createElement("div");
s.className="slot";

if(item==1){
s.classList.add("plank");
}

if(i===selectedSlot){
s.classList.add("selected");
}

s.onclick=function(){

if(inventorySlots[i]==1){
selectedSlot=i;
}else{
selectedSlot=-1;
}

drawInventory();

}

invDiv.appendChild(s);

});

}

drawInventory();

let slots=document.querySelectorAll("#grid .slot");

slots.forEach(slot=>{

slot.onclick=function(){

/* plank plaatsen */

if(selectedSlot!=-1 && !slot.classList.contains("plank")){

slot.classList.add("plank");

inventorySlots[selectedSlot]=0;

selectedSlot=-1;

drawInventory();

checkRecipe();

return;

}

/* plank terugnemen */

if(slot.classList.contains("plank")){

slot.classList.remove("plank");

let index=inventorySlots.indexOf(0);

if(index!=-1){
inventorySlots[index]=1;
}

drawInventory();

checkRecipe();

}

}

});

function checkRecipe(){

let g=[];

slots.forEach(s=>{
g.push(s.classList.contains("plank")?1:0);
});

let result=document.getElementById("result");

result.innerHTML="";

if(
g[0]==0 && g[1]==0 && g[2]==0 &&
g[3]==1 && g[4]==0 && g[5]==1 &&
g[6]==1 && g[7]==1 && g[8]==1
){

let img=document.createElement("img");

img.src="boot.png";

img.onclick=function(){
window.location="pagina2.html";
}

result.appendChild(img);

}

}

</script>

</body>
</html>
