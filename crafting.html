<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Minecraft Crafting</title>

<style>

body{
font-family:Arial;
background:#c6c6c6;
text-align:center;
margin:10px;
}

/* crafting layout */

#crafting{
display:flex;
align-items:center;
justify-content:center;
gap:4vw;
margin-top:20px;
}

/* grid */

#grid{
display:grid;
grid-template-columns:repeat(3,18vw);
gap:1vw;
background:#c6c6c6;
padding:1vw;
}

/* slot style */

.slot{
width:18vw;
height:18vw;
background:#8b8b8b;
border-top:0.8vw solid #373737;
border-left:0.8vw solid #373737;
border-right:0.8vw solid #ffffff;
border-bottom:0.8vw solid #ffffff;
cursor:pointer;
}

.plank{
background-image:url("planks_oak.png");
background-size:cover;
}

/* arrow */

#arrow img{
width:14vw;
}

/* result */

#result{
width:18vw;
height:18vw;
background:#8b8b8b;
border-top:0.8vw solid #373737;
border-left:0.8vw solid #373737;
border-right:0.8vw solid #ffffff;
border-bottom:0.8vw solid #ffffff;
display:flex;
align-items:center;
justify-content:center;
}

#result img{
width:14vw;
cursor:pointer;
}

/* inventory */

#inventory{
margin-top:5vw;
display:grid;
grid-template-columns:repeat(9,10vw);
gap:1vw;
justify-content:center;
background:#c6c6c6;
padding:1vw;
}

#inventory .slot{
width:10vw;
height:10vw;
}

</style>
</head>

<body>

<div id="crafting">

<div id="grid">
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
</div>

<div id="arrow">
<img src="arrow.png">
</div>

<div id="result"></div>

</div>

<div id="inventory"></div>

<script>

let inventorySlots = [1,1,1,1,1,0,0,0,0];
let selectedSlot = -1;

let invDiv = document.getElementById("inventory");

function drawInventory(){

invDiv.innerHTML="";

inventorySlots.forEach((item,i)=>{

let s=document.createElement("div");
s.className="slot";

if(item==1){

s.classList.add("plank");

s.onclick=function(){
selectedSlot = i;
}

}

invDiv.appendChild(s);

});

}

drawInventory();

let slots=document.querySelectorAll("#grid .slot");

slots.forEach(slot=>{

slot.onclick=function(){

if(selectedSlot!=-1 && !slot.classList.contains("plank")){

slot.classList.add("plank");

inventorySlots[selectedSlot]=0;

selectedSlot=-1;

drawInventory();

checkRecipe();

return;

}

if(slot.classList.contains("plank")){

slot.classList.remove("plank");

let index = inventorySlots.indexOf(0);

if(index!=-1){
inventorySlots[index]=1;
}

drawInventory();

checkRecipe();

}

}

});

function checkRecipe(){

let g=[];

slots.forEach(s=>{
g.push(s.classList.contains("plank")?1:0);
});

let result=document.getElementById("result");

result.innerHTML="";

if(
g[0]==0 && g[1]==0 && g[2]==0 &&
g[3]==1 && g[4]==0 && g[5]==1 &&
g[6]==1 && g[7]==1 && g[8]==1
){

let img=document.createElement("img");

img.src="boot.png";

img.onclick=function(){
window.location="pagina2.html";
}

result.appendChild(img);

}

}

</script>

</body>
</html>
