<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Minecraft Crafting</title>

<style>

body{
font-family:Arial;
background:#c6c6c6;
text-align:center;
margin:10px;
}

:root{
--slot:12vw;
}

#crafting{
display:flex;
align-items:center;
justify-content:center;
gap:3vw;
margin-top:20px;
}

#grid{
display:grid;
grid-template-columns:repeat(3,var(--slot));
gap:1vw;
padding:1vw;
}

.slot{
width:var(--slot);
height:var(--slot);
background:#8b8b8b;
border-top:0.6vw solid #373737;
border-left:0.6vw solid #373737;
border-right:0.6vw solid #ffffff;
border-bottom:0.6vw solid #ffffff;
cursor:pointer;
position:relative;
}

.plank{
background-image:url("planks_oak.png");
background-size:cover;
}

.selected{
filter:brightness(1.4);
}

.count{
position:absolute;
bottom:2px;
right:4px;
font-weight:bold;
color:white;
text-shadow:1px 1px 2px black;
font-size:4vw;
}

#arrow img{
width:9vw;
}

#result{
width:20vw;
height:20vw;
background:#8b8b8b;
border-top:0.6vw solid #373737;
border-left:0.6vw solid #373737;
border-right:0.6vw solid #ffffff;
border-bottom:0.6vw solid #ffffff;
display:flex;
align-items:center;
justify-content:center;
}

#result img{
width:80%;
cursor:pointer;
}

#inventory{
margin-top:4vw;
display:grid;
grid-template-columns:repeat(7,var(--slot));
gap:1vw;
justify-content:center;
padding:1vw;
}

</style>
</head>

<body>

<div id="crafting">

<div id="grid">
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
<div class="slot"></div>
</div>

<div id="arrow">
<img src="arrow.png">
</div>

<div id="result"></div>

</div>

<div id="inventory"></div>

<script>

let planks = 5
let selected = false

let inventory = document.getElementById("inventory")

function drawInventory(){

inventory.innerHTML=""

for(let i=0;i<7;i++){

let s=document.createElement("div")
s.className="slot"

if(i==0 && planks>0){

s.classList.add("plank")

if(selected){
s.classList.add("selected")
}

let c=document.createElement("div")
c.className="count"
c.innerText=planks
s.appendChild(c)

s.onclick=function(){
selected=true
drawInventory()
}

}else{

s.onclick=function(){
selected=false
drawInventory()
}

}

inventory.appendChild(s)

}

}

drawInventory()

let slots=document.querySelectorAll("#grid .slot")

slots.forEach(slot=>{

slot.onclick=function(){

if(selected && planks>0 && !slot.classList.contains("plank")){

slot.classList.add("plank")
planks--

drawInventory()
checkRecipe()
return

}

if(slot.classList.contains("plank")){

slot.classList.remove("plank")
planks++

drawInventory()
checkRecipe()

}

}

})

function checkRecipe(){

let g=[]

slots.forEach(s=>{
g.push(s.classList.contains("plank")?1:0)
})

let result=document.getElementById("result")
result.innerHTML=""

/* boot onder */

let recipe1 =
g[0]==0 && g[1]==0 && g[2]==0 &&
g[3]==1 && g[4]==0 && g[5]==1 &&
g[6]==1 && g[7]==1 && g[8]==1

/* boot boven */

let recipe2 =
g[0]==1 && g[1]==0 && g[2]==1 &&
g[3]==1 && g[4]==1 && g[5]==1 &&
g[6]==0 && g[7]==0 && g[8]==0

if(recipe1 || recipe2){

let img=document.createElement("img")
img.src="boot.png"

img.onclick=function(){
window.location="pagina2.html"
}

result.appendChild(img)

}

}

</script>

</body>
</html>
