<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft Crafting</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#8b8b8b;
}

#crafting{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:25px;
  margin-top:40px;
}

#grid{
  display:grid;
  grid-template-columns:repeat(3,60px);
  gap:6px;
}

.vak{
  width:60px;
  height:60px;
  background:#c6c6c6;
  border-top:3px solid #ffffff;
  border-left:3px solid #ffffff;
  border-right:3px solid #555555;
  border-bottom:3px solid #555555;
  cursor:pointer;
}

.plank{
  background-image:url("planks_oak.png");
  background-size:cover;
}

.stick{
  background-image:url("stick.png");
  background-size:contain;
  background-position:center;
  background-repeat:no-repeat;
}

#arrow{
  font-size:40px;
}

#result{
  width:70px;
  height:70px;
  background:#c6c6c6;
  border-top:3px solid #ffffff;
  border-left:3px solid #ffffff;
  border-right:3px solid #555555;
  border-bottom:3px solid #555555;
  display:flex;
  align-items:center;
  justify-content:center;
}

#result img{
  width:55px;
}
</style>
</head>

<body>

<h2>Craft iets</h2>

<div id="crafting">

<div id="grid">
<div class="vak"></div>
<div class="vak"></div>
<div class="vak"></div>
<div class="vak"></div>
<div class="vak"></div>
<div class="vak"></div>
<div class="vak"></div>
<div class="vak"></div>
<div class="vak"></div>
</div>

<div id="arrow">→</div>

<div id="result"></div>

</div>

<script>

let vakjes = document.querySelectorAll(".vak");

/*
0 leeg
1 plank
2 stick
*/

vakjes.forEach((vak)=>{

  vak.addEventListener("click",function(){

    if(vak.dataset.type==undefined) vak.dataset.type=0;

    let type = parseInt(vak.dataset.type);

    type++;

    if(type>2) type=0;

    vak.dataset.type = type;

    vak.classList.remove("plank","stick");

    if(type==1) vak.classList.add("plank");
    if(type==2) vak.classList.add("stick");

    checkRecipe();

  });

});

function checkRecipe(){

  let grid=[];

  vakjes.forEach(v=>{
    grid.push(parseInt(v.dataset.type)||0);
  });

  let boot=[0,0,0,1,0,1,1,1,1];
  let shovel=[0,1,0,0,2,0,0,2,0];

  let result=document.getElementById("result");
  result.innerHTML="";

  if(match(grid,boot)){
    result.innerHTML='<img src="boot.png">';
    return;
  }

  if(match(grid,shovel)){
    result.innerHTML='<img src="shovel.png">';
    return;
  }

}

function match(a,b){

  for(let i=0;i<9;i++){
    if(a[i]!=b[i]) return false;
  }

  return true;
}

</script>

</body>
</html>
