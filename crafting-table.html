<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft Crafting</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#8b8b8b;
}

#crafting{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:25px;
  margin-top:40px;
}

#grid{
  display:grid;
  grid-template-columns:repeat(3,60px);
  gap:6px;
}

.vak{
  width:60px;
  height:60px;
  background:#c6c6c6;
  border-top:3px solid #ffffff;
  border-left:3px solid #ffffff;
  border-right:3px solid #555555;
  border-bottom:3px solid #555555;
  cursor:pointer;
}

.plank{
  background-image:url("planks_oak.png");
  background-size:cover;
}

.stick{
  background-image:url("stick.png");
  background-size:contain;
  background-position:center;
  background-repeat:no-repeat;
}

#arrow{
  font-size:40px;
}

#result{
  width:70px;
  height:70px;
  background:#c6c6c6;
  border-top:3px solid #ffffff;
  border-left:3px solid #ffffff;
  border-right:3px solid #555555;
  border-bottom:3px solid #555555;
  display:flex;
  align-items:center;
  justify-content:center;
}

#result img{
  width:55px;
}
</style>
</head>

<body>

<h2>Craft iets</h2>

<div id="crafting">

<div id="grid">
<div class="vak"></div>
<div class="vak"></div>
<div class="vak"></div>
<div class="vak"></div>
<div class="vak"></div>
<div class="vak"></div>
<div class="vak"></div>
<div class="vak"></div>
<div class="vak"></div>
</div>

<div id="arrow">→</div>

<div id="result"></div>

</div>

<script>

let vakjes = document.querySelectorAll(".vak");

vakjes.forEach(vak=>{
  vak.dataset.type = 0;

  vak.onclick = function(){

    let t = Number(vak.dataset.type);

    t++;
    if(t>2) t=0;

    vak.dataset.type = t;

    vak.classList.remove("plank","stick");

    if(t==1) vak.classList.add("plank");
    if(t==2) vak.classList.add("stick");

    checkRecipe();
  }
});

function getGrid(){

  let g=[];
  vakjes.forEach(v=>g.push(Number(v.dataset.type)));
  return g;

}

function checkRecipe(){

  let g = getGrid();
  let result = document.getElementById("result");

  result.innerHTML="";

  // boot
  if(
  g[0]==0 && g[1]==0 && g[2]==0 &&
  g[3]==1 && g[4]==0 && g[5]==1 &&
  g[6]==1 && g[7]==1 && g[8]==1
  ){
    result.innerHTML='<img src="boot.png">';
    return;
  }

  // shovel
  if(
  g[0]==0 && g[1]==1 && g[2]==0 &&
  g[3]==0 && g[4]==2 && g[5]==0 &&
  g[6]==0 && g[7]==2 && g[8]==0
  ){
    result.innerHTML='<img src="shovel.png">';
    return;
  }

}

</script>

</body>
</html>
